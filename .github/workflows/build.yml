name: Build & Export Widgets

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: macos-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          # Generate a JSON matrix from index.json
          WIDGETS=$(jq -c '[keys[]]' index.json)
          echo "matrix=$WIDGETS" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: macos-latest
    strategy:
      matrix:
        widget: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Widget Porting Toolkit
        run: |
          brew tap nikolan123/tap
          brew install --cask widget-porting-toolkit

      - name: Package as .wdgt
        run: |
          WIDGET_DIR="${{ matrix.widget }}"
          SAFE_NAME=$(echo "$WIDGET_DIR" | tr -d ' ')
          cd "$WIDGET_DIR"
          zip -r "../${SAFE_NAME}.wdgt.zip" .
          cd ..
          echo "Zipped ${WIDGET_DIR}"

      - name: Package as macOS App
        run: |
          WIDGET_DIR="${{ matrix.widget }}"
          SAFE_NAME=$(echo "$WIDGET_DIR" | tr -d ' ')
          APP_NAME=$(echo "$SAFE_NAME" | sed 's/.wdgt$/.app/')

          # Download Support Directory
          curl -L "https://widgets.nikolan.net/WidgetResources_10.9.5.zip" -o support.zip
          unzip -q support.zip -d SupportDirectory

          # Run CLI Exporter
          /Applications/Widget\ Porting\ Toolkit.app/Contents/MacOS/Widget\ Porting\ Toolkit \
            --export \
            --input "./${WIDGET_DIR}" \
            --output "./${APP_NAME}" \
            --format macosapp \
            --support-dir "$(pwd)/SupportDirectory"

          # Zip the .app
          zip -r "${SAFE_NAME}.app.zip" "${APP_NAME}"

          # Cleanup
          rm -rf SupportDirectory support.zip "${APP_NAME}"
          echo "Built ${APP_NAME}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.widget }}-export
          path: |
            *.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-export'
          merge-multiple: true
          path: ./builds_artifacts

      - name: Push to 'builds' branch
        run: |
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git repo_builds
          cd repo_builds
          
          # Create builds branch if it doesn't exist
          git checkout builds || git checkout -b builds

          # Clear old files and copy new ones
          rm -rf *
          cp ../builds_artifacts/* .

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update builds [skip ci]"
            git push origin builds
          else
            echo "No changes to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
