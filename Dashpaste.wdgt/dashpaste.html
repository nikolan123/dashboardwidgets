	<head>
		<title>DashPaste</title>
		<style type="text/css">
			@import "style.css";
		</style>
	<script type='text/javascript' src='dashpaste.js' charset='utf-8'/>
	<script type="text/javascript" src="/System/Library/WidgetResources/AppleClasses/AppleInfoButton.js" charset="utf-8"/>
	<script type="text/javascript" src="/System/Library/WidgetResources/AppleClasses/AppleAnimator.js" charset="utf-8"/>
	<script type="text/javascript" src="/System/Library/WidgetResources/AppleClasses/AppleButton.js" charset="utf-8"/>
	<body onload='init();'>
		<div id="front">
			<img span="backgroundImage" src="Default.png" />
			<label id='codeLabel'>Code syntax: </label>
			<img id="syntaxImage" src="Images/selector.png" />
			<div id="syntaxText"></div>
			<select id='syntax' onchange='popupChanged(this);'></select>
			<div id='inputs'>
				<label id='lastPasteLabel'>Last Paste:</label><a id='lastPaste' onmouseover="this.style.cursor='hand';"></a>
			</div>
			<div id='cover'>
				Select syntax and hit the Publish button
			</div>
			<div id='prog'></div>
			<div id="paste"></div>
			<div id="infoButton"></div>
			<div id="updateMessage"><a id="updateLink" onmouseover="this.style.cursor='hand';" onclick="openurl('http://britishgraphics.co.uk/software/dashpaste');"></a></div>
		</div>
		<div id="back">
			<img span="backgroundimage" src="images/back.png">
				<div id="preferences">
					<label class="pref">Name:</label><input id='name' class='pref' /><br />
					<label class="pref">Service:</label>
					<select id="pasteSystem" class="pref" onChange="savePref('pasteSystem');checkSyntax();">
						<option value="upaste.de" selected=true>upaste.de</option>
						<option value="paste.rs">paste.rs</option>
					</select><br />
					<label class="pref">Link Type:</label>
					<select id="linkType" class="pref" onChange="savePref('linkType');">
						<option value="html" selected="selected">Html</option>
						<option value="txt">Plain Text</option>
					</select><br />
					<!--input id="update" type="checkbox" onClick="saveUpdate();">Check for updates</input-->
					<!--<input type="button" onClick="reset();initPrefs();" value="Reset all prefs"></input>-->
				</div>
				<div id="credits">
					<small>
						<a onclick="openurl('http://britishgraphics.co.uk/software/dashpaste');">DashPaste</a> version 1.1.0<br />
						Created by <a onclick="openurl('http://britishgraphics.co.uk');">British Graphics</a>
					</small>
				</div>
			<div id="doneButton"></div>
			</div>
		</div>	
	</body>
</html>
